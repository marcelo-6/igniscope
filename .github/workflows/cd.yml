name: CD Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: just

      - name: Ensure tag commit is on main
        shell: bash
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag commit is not reachable from origin/main"
            exit 1
          fi

      # Version/changelog bumping is expected before tag creation.
      - name: Verify tag matches Cargo.toml version
        run: just release-verify-tag "${GITHUB_REF_NAME}"

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes from CHANGELOG.md
        run: just release-notes "${{ steps.version.outputs.value }}" RELEASE_NOTES.md

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  build:
    name: Build Release Binaries
    needs: prepare
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_label: linux
          - os: windows-latest
            artifact_label: windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: just

      - name: Build and package binary
        run: just release-artifact dist

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.artifact_label }}
          path: dist/*

  publish:
    name: Publish Crate
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: rustup update stable

      - name: Install just
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: just

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: just publish-release

  release:
    name: Create GitHub Release
    needs:
      - prepare
      - build
      - publish
    runs-on: ubuntu-latest
    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub release with notes and binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: artifacts/release-notes/RELEASE_NOTES.md
          files: |
            artifacts/binaries-linux/*
            artifacts/binaries-windows/*
